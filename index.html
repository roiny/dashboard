<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tomorrow.io Widget</title>
  <style>
    /* 可選：讓 widget 在 iframe 中自適應寬度 */
    html, body { margin: 0; padding: 0; background-color:black; }
    .widget-wrapper { width: 100%; max-width: 800px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="widget-wrapper">
    <div class="tomorrow"
         data-location-id="148170"
         data-language="EN"
         data-unit-system="METRIC"
         data-skin="dark"
         data-widget-type="upcoming"
         style="padding-bottom:22px;position:relative;">
    </div>
  </div>

  <script>
    (function(d, s, id) {
      if (d.getElementById(id)) {
        if (window.__TOMORROW__) { window.__TOMORROW__.renderWidget(); }
        return;
      }
      const fjs = d.getElementsByTagName(s)[0];
      const js = d.createElement(s);
      js.id = id;
      js.src = "https://www.tomorrow.io/v1/widget/sdk/sdk.bundle.min.js";
      fjs.parentNode.insertBefore(js, fjs);
    })(document, 'script', 'tomorrow-sdk');
  </script>
</body>
</html>
